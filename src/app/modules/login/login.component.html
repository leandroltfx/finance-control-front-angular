<main class="fc-w-30 fc-center fc-ptop-5">
    <mat-card>
        <mat-card-header>
            <mat-card-title>
                <h1>Finance Control</h1>
            </mat-card-title>
        </mat-card-header>
        <mat-card-content>
            <form [formGroup]="loginForm" (submit)="login()">
                <mat-form-field class="fc-w-100">
                    <mat-label>E-mail</mat-label>
                    <input matInput formControlName="email">
                    <mat-error *ngIf="loginForm.controls['email'].hasError('required')">
                        Informe o e-mail
                    </mat-error>
                    <mat-error *ngIf="loginForm.controls['email'].hasError('pattern')">
                        E-mail inválido
                    </mat-error>
                    <mat-icon matSuffix>mail</mat-icon>
                </mat-form-field>
                <mat-form-field class="fc-w-100">
                    <mat-label>Senha</mat-label>
                    <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'">
                    <mat-error *ngIf="loginForm.controls['password'].hasError('required')">
                        Informe a senha
                    </mat-error>
                    <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
                        <mat-icon>{{ hidePassword ? 'visibility' : 'visibility_off' }}</mat-icon>
                    </button>
                </mat-form-field>
                <section class="fc-txt-right">
                    <a mat-button (click)="goToResetPassword()">Esqueceu a senha?</a>
                </section>
                <section class="fc-ptop-1">
                    <button mat-raised-button color="primary" class="fc-w-100" type="submit">
                        Entrar
                    </button>
                </section>
                <section class="fc-ptop-1 fc-flex fc-align-items-center">
                    Não tem uma conta? <a mat-button (click)="goToUserRegistration()">Cadastre-se</a>
                </section>
            </form>
        </mat-card-content>
    </mat-card>
</main>
