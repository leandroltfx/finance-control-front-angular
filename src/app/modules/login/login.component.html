<div class="ltf-w-30 ltf-center ltf-ptop-3">
    <mat-card>
        <mat-card-header>
            <mat-card-title>
                <div class="ltf-w-100 ltf-txt-center">
                    <h1>Finance Control</h1>
                </div>
            </mat-card-title>
        </mat-card-header>
        <hr class="ltf-w-95">
        <mat-card-content>
            <form [formGroup]="loginForm" (submit)="login()">
                <mat-form-field class="ltf-w-100 ltf-mtop-1">
                    <mat-label>Email</mat-label>
                    <input matInput formControlName="email" required>
                </mat-form-field>
                <mat-form-field class="ltf-w-100 ltf-mtop-1">
                    <mat-label>Senha</mat-label>
                    <input matInput formControlName="password" required>
                </mat-form-field>
                <div class="ltf-txt-right">
                    <button mat-button type="button">
                        Esqueceu a senha?
                    </button>
                </div>
                <div class="ltf-mtop-1">
                    <button mat-raised-button color="primary" class="ltf-w-100" type="submit">
                        Login
                    </button>
                </div>
                <div class="ltf-mtop-1 ltf-flex ltf-align-items-center">
                    Não tem uma conta?
                    <button mat-button type="button">
                        Cadastre-se
                    </button>
                </div>
            </form>
        </mat-card-content>
    </mat-card>
</div>
