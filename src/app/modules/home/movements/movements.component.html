<table mat-table *ngIf="movementsDto.length" [dataSource]="movementsDto" class="mat-elevation-z8">
    <ng-container matColumnDef="registerDate">
        <th mat-header-cell *matHeaderCellDef>Data</th>
        <td mat-cell *matCellDef="let movement">{{ movement.registerDate }}</td>
    </ng-container>
    <ng-container matColumnDef="bankAccount">
        <th mat-header-cell *matHeaderCellDef>Conta</th>
        <td mat-cell *matCellDef="let movement">{{ movement.bankAccount }}</td>
    </ng-container>
    <ng-container matColumnDef="category">
        <th mat-header-cell *matHeaderCellDef>Categoria</th>
        <td mat-cell *matCellDef="let movement">{{ movement.category }}</td>
    </ng-container>
    <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Descrição</th>
        <td mat-cell *matCellDef="let movement">{{ movement.description }}</td>
    </ng-container>
    <ng-container matColumnDef="formattedBalance">
        <th mat-header-cell *matHeaderCellDef>Valor</th>
        <td mat-cell *matCellDef="let movement">{{ movement.formattedBalance }}</td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
