<main class="fc-w-30 fc-center fc-ptop-5">
    <mat-card>
        <mat-card-header>
            <mat-card-title>
                <h1>Cadastrar usuário</h1>
            </mat-card-title>
        </mat-card-header>
        <mat-card-content>
            <form [formGroup]="userRegistrationForm" (submit)="registerUser()">
                <mat-form-field class="fc-w-100">
                    <mat-label>Nome de usuário</mat-label>
                    <input matInput formControlName="username">
                    <mat-error *ngIf="userRegistrationForm.controls['username'].hasError('required')">
                        Informe o nome de usuário
                    </mat-error>
                    <mat-error *ngIf="userRegistrationForm.controls['username'].hasError('pattern')">
                        O nome de usuário não pode conter caracteres especiais ou espaços em branco
                    </mat-error>
                    <mat-icon matSuffix>person</mat-icon>
                </mat-form-field>
                <mat-form-field class="fc-w-100 fc-ptop-2">
                    <mat-label>E-mail</mat-label>
                    <input matInput formControlName="email">
                    <mat-error *ngIf="userRegistrationForm.controls['email'].hasError('required')">
                        Informe o e-mail
                    </mat-error>
                    <mat-error *ngIf="userRegistrationForm.controls['email'].hasError('pattern')">
                        E-mail inválido
                    </mat-error>
                    <mat-icon matSuffix>mail</mat-icon>
                </mat-form-field>
                <mat-form-field class="fc-w-100 fc-ptop-2">
                    <mat-label>Senha</mat-label>
                    <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'">
                    <mat-error *ngIf="userRegistrationForm.controls['password'].hasError('required')">
                        Informe a senha
                    </mat-error>
                    <mat-error *ngIf="userRegistrationForm.controls['password'].hasError('minlength')">
                        A senha deve ter no mínimo {{ passwordMinLength }} caracteres
                    </mat-error>
                    <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
                        <mat-icon>{{ hidePassword ? 'visibility' : 'visibility_off' }}</mat-icon>
                    </button>
                </mat-form-field>
                <section class="fc-ptop-1 fc-flex fc-align-items-center fc-justify-content-end">
                    <button mat-raised-button type="button" (click)="cancelUserRegistration()">
                        Cancelar
                    </button>
                    <button mat-raised-button color="primary" type="submit" class="fc-mleft-1">
                        Cadastrar
                    </button>
                </section>
            </form>
        </mat-card-content>
    </mat-card>
</main>
