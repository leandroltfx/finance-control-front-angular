<div class="ltf-w-30 ltf-center ltf-ptop-3">
    <mat-card>
        <mat-card-header>
            <mat-card-title>
                <div class="ltf-w-100 ltf-txt-center">
                    <h1>{{ 'RESET_PASSWORD.TITLE' | translate }}</h1>
                </div>
            </mat-card-title>
        </mat-card-header>
        <hr class="ltf-w-95">
        <mat-card-content>
            <form [formGroup]="recoverPasswordForm" (submit)="recoverPassword()">
                <mat-form-field class="ltf-w-100 ltf-mtop-1">
                    <mat-label>{{ 'RESET_PASSWORD.EMAIL' | translate }}</mat-label>
                    <input matInput formControlName="email" required>
                    <mat-error *ngIf="recoverPasswordForm.controls['email'].hasError('required')">
                        {{ 'RESET_PASSWORD.ERROR_REQUIRED_EMAIL' | translate }}
                    </mat-error>
                    <mat-error *ngIf="recoverPasswordForm.controls['email'].hasError('pattern')">
                        {{ 'RESET_PASSWORD.ERROR_PATTERN_EMAIL' | translate }}
                    </mat-error>
                </mat-form-field>
                <div class="ltf-mtop-1">
                    <button mat-raised-button color="primary" class="ltf-w-100" type="submit">
                        {{ 'RESET_PASSWORD.SEND_EMAIL_TO_RESET_PASSWORD' | translate }}
                    </button>
                </div>
                <div class="ltf-txt-center ltf-mtop-1">
                    <button mat-button type="button" (click)="goToLogin()">
                        {{ 'RESET_PASSWORD.CANCEL' | translate }}
                    </button>
                </div>
            </form>
        </mat-card-content>
    </mat-card>
</div>
