<main class="fc-w-30 fc-center fc-ptop-5">
    <mat-card>
        <mat-card-header>
            <mat-card-title>
                <h1>Redefinir senha</h1>
            </mat-card-title>
            <mat-card-subtitle>
                Você irá receber um código no e-mail informado para prosseguir na redefinição de senha.
            </mat-card-subtitle>
        </mat-card-header>
        <mat-card-content>
            <form [formGroup]="resetPasswordForm" (submit)="sendCodeToEmail()">
                <mat-form-field class="fc-w-100 fc-ptop-1">
                    <mat-label>E-mail</mat-label>
                    <input matInput formControlName="email">
                    <mat-error *ngIf="resetPasswordForm.controls['email'].hasError('required')">
                        Informe o e-mail
                    </mat-error>
                    <mat-error *ngIf="resetPasswordForm.controls['email'].hasError('pattern')">
                        E-mail inválido
                    </mat-error>
                    <mat-icon matSuffix>mail</mat-icon>
                </mat-form-field>
                <section class="fc-ptop-1 fc-flex fc-align-items-center fc-justify-content-end">
                    <button mat-raised-button type="button" (click)="cancelResetPassword()">
                        Cancelar
                    </button>
                    <button mat-raised-button color="primary" type="submit" class="fc-mleft-1">
                        Receber código
                    </button>
                </section>
            </form>
        </mat-card-content>
    </mat-card>
</main>
