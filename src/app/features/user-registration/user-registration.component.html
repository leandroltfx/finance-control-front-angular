<main class="fc-w-30 fc-center fc-ptop-5">
    <mat-card>
        <mat-card-header>
            <mat-card-title>
                <div class="fc-w-100 fc-txt-center">
                    <h1>Cadastro de Usuário</h1>
                </div>
            </mat-card-title>
        </mat-card-header>
        <hr class="fc-w-95">
        <mat-card-content>
            <form [formGroup]="userRegistrationForm" (submit)="registerUser()">
                <mat-form-field class="fc-w-100 fc-mtop-1">
                    <mat-label>Email</mat-label>
                    <input matInput formControlName="email">
                    <mat-error *ngIf="userRegistrationForm.controls['email'].hasError('required')">Informe o email</mat-error>
                    <mat-error *ngIf="userRegistrationForm.controls['email'].hasError('pattern')">Email inválido</mat-error>
                </mat-form-field>
                <mat-form-field class="fc-w-100 fc-mtop-1">
                    <mat-label>Nome de usuário</mat-label>
                    <input matInput formControlName="username">
                    <mat-error *ngIf="userRegistrationForm.controls['username'].hasError('required')">Informe o nome de usuário</mat-error>
                    <mat-error *ngIf="userRegistrationForm.controls['username'].hasError('minlength')">O nome de usuário deve ter no mínimo 3 caracteres</mat-error>
                    <mat-error *ngIf="userRegistrationForm.controls['username'].hasError('pattern')">O nome de usuário não deve ter espaços em branco</mat-error>
                </mat-form-field>
                <mat-form-field class="fc-w-100 fc-mtop-1">
                    <mat-label>Senha</mat-label>
                    <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password">
                    <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
                        <mat-icon>{{ hidePassword ? 'visibility' : 'visibility_off' }}</mat-icon>
                    </button>
                    <mat-error *ngIf="userRegistrationForm.controls['password'].hasError('required')">Informe a senha</mat-error>
                    <mat-error *ngIf="userRegistrationForm.controls['password'].hasError('minlength')">A senha deve ter no mínimo 8 caracteres</mat-error>
                </mat-form-field>
                <div class="fc-mtop-1">
                    <button mat-raised-button color="primary" class="fc-w-100" type="submit">
                        Cadastrar
                    </button>
                </div>
                <div class="fc-mtop-1 fc-txt-center">
                    <button mat-button type="button" (click)="cancelRegisterUser()">
                        Cancelar
                    </button>
                </div>
            </form>
        </mat-card-content>
    </mat-card>
</main>
