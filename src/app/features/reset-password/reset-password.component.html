<main class="fc-w-30 fc-center fc-ptop-5">
    <mat-card>
        <mat-card-header>
            <mat-card-title>
                <div class="fc-w-100 fc-txt-center">
                    <h1>{{ 'RESET_PASSWORD.TITLE' | translate }}</h1>
                </div>
            </mat-card-title>
        </mat-card-header>
        <hr class="fc-w-95">
        <mat-card-content>
            <form [formGroup]="resetPasswordForm" (submit)="sendCode()">
                <mat-form-field class="fc-w-100 fc-mtop-1">
                    <mat-label>{{ 'RESET_PASSWORD.EMAIL' | translate }}</mat-label>
                    <input matInput formControlName="email">
                    <mat-error *ngIf="resetPasswordForm.controls['email'].hasError('required')">
                        {{ 'RESET_PASSWORD.ERROR_REQUIRED_EMAIL' | translate }}
                    </mat-error>
                </mat-form-field>
                <div class="fc-mtop-1">
                    <button mat-raised-button color="primary" class="fc-w-100" type="submit">
                        {{ 'RESET_PASSWORD.SUBMIT' | translate }}
                    </button>
                </div>
                <div class="fc-mtop-1 fc-txt-center">
                    <button mat-button type="button" (click)="cancelResetPassword()">
                        {{ 'RESET_PASSWORD.CANCEL' | translate }}
                    </button>
                </div>
            </form>
        </mat-card-content>
    </mat-card>
</main>
