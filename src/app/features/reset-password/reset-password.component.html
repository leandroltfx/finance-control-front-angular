<main class="fc-w-30 fc-center fc-ptop-5">
    <mat-card>
        <mat-card-header>
            <mat-card-title>
                <div class="fc-w-100 fc-txt-center">
                    <h1>Redefinição de senha</h1>
                </div>
            </mat-card-title>
        </mat-card-header>
        <hr class="fc-w-95">
        <mat-card-content>
            <form [formGroup]="resetPasswordForm" (submit)="sendTemporaryPassword()">
                <mat-form-field class="fc-w-100 fc-mtop-1">
                    <mat-label>Email</mat-label>
                    <input matInput formControlName="email">
                    <mat-error *ngIf="resetPasswordForm.controls['email'].hasError('required')">Informe o email</mat-error>
                </mat-form-field>
                <div class="fc-mtop-1">
                    <button mat-raised-button color="primary" class="fc-w-100" type="submit">
                        Enviar código para redefinição de senha
                    </button>
                </div>
                <div class="fc-mtop-1 fc-txt-center">
                    <button mat-button type="button" (click)="cancelResetPassword()">
                        Cancelar
                    </button>
                </div>
            </form>
        </mat-card-content>
    </mat-card>
</main>
